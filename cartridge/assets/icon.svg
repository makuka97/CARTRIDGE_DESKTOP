<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1a1d2e"/>

  <!-- Cartridge body -->
  <rect x="56" y="80" width="144" height="100" rx="8" fill="#2a2d42" stroke="#7c73ff" stroke-width="3"/>

  <!-- Cartridge notch top -->
  <rect x="96" y="68" width="64" height="20" rx="4" fill="#2a2d42" stroke="#7c73ff" stroke-width="3"/>

  <!-- Label area -->
  <rect x="68" y="94" width="120" height="72" rx="4" fill="#32364f"/>

  <!-- CARTRIDGE text -->
  <text x="128" y="136" font-family="monospace" font-size="18" font-weight="bold"
        fill="#7c73ff" text-anchor="middle" letter-spacing="3">CART</text>

  <!-- Bottom connector pins -->
  <rect x="80"  y="174" width="8" height="16" rx="2" fill="#52567a"/>
  <rect x="96"  y="174" width="8" height="16" rx="2" fill="#52567a"/>
  <rect x="112" y="174" width="8" height="16" rx="2" fill="#52567a"/>
  <rect x="128" y="174" width="8" height="16" rx="2" fill="#52567a"/>
  <rect x="144" y="174" width="8" height="16" rx="2" fill="#52567a"/>
  <rect x="160" y="174" width="8" height="16" rx="2" fill="#52567a"/>
</svg>
